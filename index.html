<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하이탑부동산 지도앱</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      color: #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── HEADER ─── */
    .header {
      background: #1a2744;
      color: #d4af37;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .header-sub { font-size: 11px; color: #9aaccc; }
    .btn-shortcut {
      background: #d4af37;
      color: #1a2744;
      padding: 7px 13px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .btn-shortcut:hover { opacity: 0.85; }

    /* ─── TABS ─── */
    .tab-nav {
      background: #172039;
      display: flex;
      flex-shrink: 0;
      border-bottom: 2px solid #d4af37;
    }
    .tab-btn {
      flex: 1;
      padding: 11px 6px;
      background: none;
      border: none;
      color: #7a91b5;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .tab-btn:hover { color: #d4af37; background: rgba(212,175,55,0.07); }
    .tab-btn.active { color: #d4af37; border-bottom-color: #d4af37; background: rgba(212,175,55,0.1); }

    /* ─── TAB CONTENT ─── */
    .tab-content { display: none; flex: 1; overflow: hidden; }
    .tab-content.active { display: flex; }
    #tab-2.active { flex-direction: column; }

    /* ─── MAP ─── */
    .map-wrap { flex: 1; position: relative; min-height: 0; }
    .map-div { width: 100%; height: 100%; min-height: calc(100vh - 200px); }

    /* ─── MAP TYPE TOGGLE ─── */
    .map-type-toggle {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      background: white;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .mtt-btn {
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      background: white;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .mtt-btn + .mtt-btn { border-left: 1.5px solid #ddd; }
    .mtt-btn:hover { background: #f5f5f5; }
    .mtt-btn.active { background: #1a2744; color: #d4af37; }

    /* ─── MAP CONTROLS ─── */
    .map-controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .map-ctrl-btn {
      background: white;
      border: 1.5px solid #ddd;
      padding: 8px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: all 0.15s;
    }
    .map-ctrl-btn:hover { background: #f5f5f5; }
    .map-ctrl-btn.active { background: #1a2744; color: #d4af37; border-color: #1a2744; }

    /* ─── SIDEBAR / PANEL ─── */
    .panel {
      width: 290px;
      flex-shrink: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: -3px 0 12px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .panel-header {
      background: #1a2744;
      color: #d4af37;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-header .badge {
      background: #d4af37;
      color: #1a2744;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 800;
      margin-left: 6px;
    }
    .panel-body { flex: 1; overflow-y: auto; }

    .btn-add {
      background: #d4af37;
      color: #1a2744;
      border: none;
      padding: 5px 11px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* ─── PROPERTY CARDS ─── */
    .prop-card {
      padding: 12px 14px;
      border-bottom: 1px solid #eef0f4;
      cursor: pointer;
      transition: background 0.15s;
    }
    .prop-card:hover { background: #fdf9ed; }
    .prop-card .c-addr { font-weight: 700; font-size: 13px; color: #1a2744; }
    .prop-card .c-price { font-size: 12px; color: #c49a10; font-weight: 600; margin-top: 3px; }
    .prop-card .c-use { font-size: 11px; color: #888; margin-top: 2px; }
    .card-actions { display: flex; gap: 6px; margin-top: 7px; }
    .btn-e { background: #e8f0fe; color: #1558d6; border: none; padding: 3px 9px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    .btn-d { background: #fce8e6; color: #c62828; border: none; padding: 3px 9px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    .btn-e:hover { background: #d2e3fc; }
    .btn-d:hover { background: #f8d7d4; }

    /* ─── INDUSTRIAL COMPLEX CHIPS ─── */
    .complex-chips-wrap {
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
      background: #fafafa;
    }
    .chip {
      display: inline-block;
      background: #f0f0f0;
      border: 1.5px solid #ddd;
      padding: 4px 9px;
      border-radius: 14px;
      font-size: 11px;
      font-weight: 600;
      margin: 2px 2px;
      cursor: pointer;
      transition: all 0.15s;
      color: #444;
    }
    .chip:hover { background: #e8eefd; border-color: #aac; color: #1a2744; }
    .chip.active { background: #1a2744; color: #d4af37; border-color: #1a2744; }

    /* ─── TAB 3 SEARCH BAR ─── */
    .search-bar {
      background: white;
      padding: 10px 14px;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .search-bar input {
      flex: 1;
      padding: 8px 13px;
      border: 1.5px solid #d0d5dd;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      transition: border 0.2s;
    }
    .search-bar input:focus { border-color: #d4af37; }
    .btn-search {
      background: #1a2744;
      color: #d4af37;
      border: none;
      padding: 8px 16px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .tab3-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ─── CSV UPLOAD ─── */
    .upload-section {
      padding: 10px 14px;
      background: #f8faf8;
      border-bottom: 1px solid #e8eee8;
      flex-shrink: 0;
    }
    .upload-hint { font-size: 10px; color: #888; margin-bottom: 5px; line-height: 1.4; }
    .btn-upload {
      display: block;
      width: 100%;
      background: #f0f7f0;
      color: #2e7d32;
      border: 1.5px dashed #66bb6a;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn-upload:hover { background: #e8f5e9; }

    /* ─── MODAL ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,15,30,0.65);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 14px;
      width: min(94vw, 480px);
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-hd {
      background: linear-gradient(135deg, #1a2744, #243560);
      color: #d4af37;
      padding: 16px 20px;
      border-radius: 14px 14px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-hd h3 { font-size: 15px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: #d4af37;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
    }
    .modal-close:hover { opacity: 1; }
    .modal-bd { padding: 18px 20px; }
    .modal-ft {
      padding: 14px 20px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      border-top: 1px solid #eef;
    }

    /* ─── FORM ─── */
    .fg { margin-bottom: 13px; }
    .fg label { display: block; font-size: 11px; font-weight: 700; color: #566; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    .fg input, .fg textarea, .fg select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #d0d5dd;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      transition: border 0.2s;
      background: #fafafa;
    }
    .fg input:focus, .fg textarea:focus, .fg select:focus {
      border-color: #d4af37;
      background: white;
      box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
    }
    .fg textarea { resize: vertical; min-height: 65px; }
    .fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-pri {
      background: linear-gradient(135deg, #1a2744, #243560);
      color: #d4af37;
      border: none;
      padding: 10px 22px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-pri:hover { opacity: 0.88; }
    .btn-sec {
      background: #f0f1f3;
      color: #555;
      border: none;
      padding: 10px 18px;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-sec:hover { background: #e5e6e8; }

    /* ─── POPUP ─── */
    .lf-popup { min-width: 200px; max-width: 260px; font-size: 12px; }
    .lf-popup-title { font-weight: 800; color: #1a2744; font-size: 14px; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
    .lf-popup-row { display: flex; gap: 6px; margin-bottom: 4px; }
    .lf-popup-label { color: #888; min-width: 52px; flex-shrink: 0; }
    .lf-popup-val { color: #222; font-weight: 500; word-break: break-all; }
    .lf-popup-link { color: #1558d6; text-decoration: none; font-size: 11px; }
    .lf-popup-actions { display: flex; gap: 6px; margin-top: 9px; padding-top: 8px; border-top: 1px solid #eee; }

    /* ─── EMPTY STATE ─── */
    .empty { padding: 36px 20px; text-align: center; color: #bbb; font-size: 13px; line-height: 1.7; }
    .empty .ei { font-size: 34px; display: block; margin-bottom: 8px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 700px) {
      .tab-content.active:not(#tab-2) { flex-direction: column-reverse; }
      .panel { width: 100%; height: 220px; border-top: 2px solid #1a2744; }
      .tab3-body { flex-direction: column-reverse; }
      .tab3-body .panel { height: 200px; }
      .header-logo { font-size: 15px; }
      .btn-shortcut { font-size: 11px; padding: 6px 10px; }
      .tab-btn { font-size: 11px; padding: 10px 4px; }
    }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header">
  <div class="header-left">
    <div>
      <div class="header-logo">🏢 하이탑부동산</div>
      <div class="header-sub">파주·운정 공인중개사 23년 경력</div>
    </div>
  </div>
  <a href="https://hitoputube-creator.github.io/haitop-realty-system" class="btn-shortcut" target="_blank">하이탑매물관리 →</a>
</header>

<!-- ═══ TABS ═══ -->
<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab(0)">헤이리마을</button>
  <button class="tab-btn" onclick="switchTab(1)">파주 산업단지</button>
  <button class="tab-btn" onclick="switchTab(2)">운정 단독택지</button>
</nav>

<!-- ═══ TAB 1: 헤이리마을 ═══ -->
<section class="tab-content active" id="tab-0">
  <div class="map-wrap">
    <div id="map-heyri" class="map-div"></div>
    <div class="map-controls">
      <button class="map-ctrl-btn" id="btn-pin-mode" onclick="togglePinMode()">📍 핀 추가</button>
    </div>
    <div class="map-type-toggle">
      <button class="mtt-btn" id="mtt0-road" onclick="setMapType('road')">일반지도</button>
      <button class="mtt-btn active" id="mtt0-district" onclick="setMapType('district')">지적편집도</button>
    </div>
  </div>
  <aside class="panel">
    <div class="panel-header">
      <span>매물 목록<span class="badge" id="cnt-heyri">0</span></span>
      <button class="btn-add" onclick="openPropModal('heyri')">+ 추가</button>
    </div>
    <div class="panel-body" id="list-heyri">
      <div class="empty"><span class="ei">🏠</span>매물이 없습니다.<br>지도를 클릭해 핀을 추가하세요.</div>
    </div>
  </aside>
</section>

<!-- ═══ TAB 2: 파주 산업단지 ═══ -->
<section class="tab-content" id="tab-1">
  <div class="map-wrap">
    <div id="map-industrial" class="map-div"></div>
    <div class="map-type-toggle">
      <button class="mtt-btn" id="mtt1-road" onclick="setMapType('road')">일반지도</button>
      <button class="mtt-btn active" id="mtt1-district" onclick="setMapType('district')">지적편집도</button>
    </div>
  </div>
  <aside class="panel">
    <div class="panel-header">
      <span>산업단지 매물</span>
      <button class="btn-add" onclick="openPropModal('industrial')">+ 추가</button>
    </div>
    <div class="complex-chips-wrap" id="complex-chips"></div>
    <div class="panel-body" id="list-industrial">
      <div class="empty"><span class="ei">🏭</span>산업단지를 선택하세요</div>
    </div>
  </aside>
</section>

<!-- ═══ TAB 3: 운정 단독택지 ═══ -->
<section class="tab-content" id="tab-2">
  <div class="search-bar">
    <input type="text" id="addr-input" placeholder="지번 검색 (예: 동패동 2132)"
           onkeydown="if(event.key==='Enter') searchAddr()">
    <button class="btn-search" onclick="searchAddr()">🔍 검색</button>
  </div>
  <div class="tab3-body">
    <div class="map-wrap">
      <div id="map-ungjeong" class="map-div"></div>
      <div class="map-type-toggle">
        <button class="mtt-btn" id="mtt2-road" onclick="setMapType('road')">일반지도</button>
        <button class="mtt-btn active" id="mtt2-district" onclick="setMapType('district')">지적편집도</button>
      </div>
    </div>
    <aside class="panel">
      <div class="panel-header">
        <span>필지 목록<span class="badge" id="cnt-ungjeong">0</span></span>
        <button class="btn-add" onclick="openPlotModal()">+ 추가</button>
      </div>
      <div class="upload-section">
        <div class="upload-hint">CSV 형식: 지번,면적,공급단가,공급금액,건폐율,용적률,메모</div>
        <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="handleCSV(this)">
        <button class="btn-upload" onclick="document.getElementById('csv-file').click()">📂 CSV 파일 업로드</button>
      </div>
      <div class="panel-body" id="list-ungjeong">
        <div class="empty"><span class="ei">🏘</span>등록된 필지가 없습니다.</div>
      </div>
    </aside>
  </div>
</section>

<!-- ═══ MODAL: 매물 ═══ -->
<div class="modal-overlay" id="modal-prop" onclick="closeOnBg(event,'modal-prop')">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="modal-prop-title">매물 추가</h3>
      <button class="modal-close" onclick="closeModal('modal-prop')">×</button>
    </div>
    <div class="modal-bd">
      <input type="hidden" id="p-id">
      <input type="hidden" id="p-tab">
      <input type="hidden" id="p-lat">
      <input type="hidden" id="p-lng">
      <div class="fg" id="fg-complex">
        <label>산업단지</label>
        <select id="p-complex"><option value="">선택하세요</option></select>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>지번 *</label>
          <input type="text" id="p-jibun" placeholder="예: 헤이리마을 산83-1">
        </div>
        <div class="fg">
          <label>면적 (㎡)</label>
          <input type="text" id="p-area" placeholder="예: 330">
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>매매가</label>
          <input type="text" id="p-sale" placeholder="예: 5억">
        </div>
        <div class="fg">
          <label>임대가 (전/월)</label>
          <input type="text" id="p-rent" placeholder="예: 보증500/월50">
        </div>
      </div>
      <div class="fg">
        <label>용도</label>
        <select id="p-use">
          <option value="">선택</option>
          <option>근린생활시설</option>
          <option>업무시설</option>
          <option>공장</option>
          <option>창고</option>
          <option>토지</option>
          <option>주거</option>
          <option>기타</option>
        </select>
      </div>
      <div class="fg">
        <label>메모</label>
        <textarea id="p-memo" placeholder="매물 특이사항 등"></textarea>
      </div>
      <div class="fg">
        <label>네이버 매물 링크</label>
        <input type="url" id="p-naver" placeholder="https://...">
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn-sec" onclick="closeModal('modal-prop')">취소</button>
      <button class="btn-pri" onclick="saveProp()">저장</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: 필지 ═══ -->
<div class="modal-overlay" id="modal-plot" onclick="closeOnBg(event,'modal-plot')">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="modal-plot-title">필지 추가</h3>
      <button class="modal-close" onclick="closeModal('modal-plot')">×</button>
    </div>
    <div class="modal-bd">
      <input type="hidden" id="pl-id">
      <input type="hidden" id="pl-lat">
      <input type="hidden" id="pl-lng">
      <div class="fg">
        <label>지번 *</label>
        <input type="text" id="pl-jibun" placeholder="예: 동패동 2132">
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>면적 (㎡)</label>
          <input type="text" id="pl-area" placeholder="예: 165.0">
        </div>
        <div class="fg">
          <label>공급단가 (원/㎡)</label>
          <input type="text" id="pl-unit" placeholder="예: 2,500,000" oninput="calcTotal()">
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>공급금액</label>
          <input type="text" id="pl-total" placeholder="자동계산">
        </div>
        <div class="fg">
          <label>건폐율</label>
          <input type="text" id="pl-bcr" placeholder="예: 60%">
        </div>
      </div>
      <div class="fg">
        <label>용적률</label>
        <input type="text" id="pl-far" placeholder="예: 150%">
      </div>
      <div class="fg">
        <label>메모</label>
        <textarea id="pl-memo" placeholder="필지 특이사항 등"></textarea>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn-sec" onclick="closeModal('modal-plot')">취소</button>
      <button class="btn-pri" onclick="savePlot()">저장</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// ■ STORAGE
// ════════════════════════════════════════════
const DB = {
  get: k => JSON.parse(localStorage.getItem(k) || '[]'),
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};

// ════════════════════════════════════════════
// ■ MAP TILE LAYERS
// ════════════════════════════════════════════
// OSM 기본 타일
const TILE_OSM = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
const TILE_OSM_ATTR = '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>';

// 브이월드 배경지도 (국토교통부)
const TILE_VWORLD = 'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png';
const TILE_VWORLD_ATTR = '© <a href="https://www.vworld.kr">VWorld</a> 국토교통부';

// 브이월드 지적도 오버레이
const TILE_CADASTRAL = 'https://xdworld.vworld.kr/2d/Cadastral/service/{z}/{x}/{y}.png';

// ════════════════════════════════════════════
// ■ MAP TYPE
// ════════════════════════════════════════════
let currentMapType = 'district';
const mapObjects = [null, null, null];
const baseLayers = [null, null, null];
const cadastralLayers = [null, null, null];

function setMapType(type) {
  currentMapType = type;
  [0,1,2].forEach(i => {
    const road = document.getElementById(`mtt${i}-road`);
    const dist = document.getElementById(`mtt${i}-district`);
    if (road) road.classList.toggle('active', type === 'road');
    if (dist) dist.classList.toggle('active', type === 'district');
  });
  mapObjects.forEach((map, i) => {
    if (!map) return;
    if (type === 'district') {
      if (cadastralLayers[i] && !map.hasLayer(cadastralLayers[i])) {
        cadastralLayers[i].addTo(map);
      }
    } else {
      if (cadastralLayers[i] && map.hasLayer(cadastralLayers[i])) {
        map.removeLayer(cadastralLayers[i]);
      }
    }
  });
}

function createMap(elId, lat, lng, zoom) {
  const map = L.map(elId, { zoomControl: true }).setView([lat, lng], zoom);

  // 브이월드 배경지도 (실패시 OSM 폴백)
  const baseLayer = L.tileLayer(TILE_VWORLD, {
    attribution: TILE_VWORLD_ATTR,
    maxZoom: 19,
    errorTileUrl: '',
  }).addTo(map);

  baseLayer.on('tileerror', () => {
    // 브이월드 실패시 OSM으로 교체
    map.removeLayer(baseLayer);
    L.tileLayer(TILE_OSM, { attribution: TILE_OSM_ATTR, maxZoom: 19 }).addTo(map);
  });

  // 지적도 오버레이
  const cadastralLayer = L.tileLayer(TILE_CADASTRAL, {
    attribution: '© 국토교통부 지적도',
    maxZoom: 19,
    opacity: 0.7,
  });

  return { map, baseLayer, cadastralLayer };
}

// ════════════════════════════════════════════
// ■ TAB SWITCHING
// ════════════════════════════════════════════
const mapInited = [false, false, false];
let activeTab = 0;

function switchTab(i) {
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', i === j));
  document.querySelectorAll('.tab-content').forEach((c, j) => c.classList.toggle('active', i === j));
  activeTab = i;
  setTimeout(() => {
    if (!mapInited[i]) {
      initMap(i);
      mapInited[i] = true;
    } else if (mapObjects[i]) {
      mapObjects[i].invalidateSize();
    }
  }, 60);
}

// ════════════════════════════════════════════
// ■ MAP INIT
// ════════════════════════════════════════════
const MAP_CFG = [
  { el: 'map-heyri',      lat: 37.7929, lng: 126.6856, zoom: 14 },
  { el: 'map-industrial', lat: 37.7601, lng: 126.7800, zoom: 11 },
  { el: 'map-ungjeong',   lat: 37.7108, lng: 126.7890, zoom: 14 },
];

function initMap(i) {
  const cfg = MAP_CFG[i];
  const { map, baseLayer, cadastralLayer } = createMap(cfg.el, cfg.lat, cfg.lng, cfg.zoom);
  mapObjects[i] = map;
  baseLayers[i] = baseLayer;
  cadastralLayers[i] = cadastralLayer;

  // 기본값: 지적편집도
  if (currentMapType === 'district') cadastralLayer.addTo(map);

  if (i === 0) setupHeyri(map);
  else if (i === 1) setupIndustrial(map);
  else setupUngjeong(map);
}

// ════════════════════════════════════════════
// ■ TAB 1 — 헤이리마을
// ════════════════════════════════════════════
let pinMode = false;
let heyriMks = {};

function setupHeyri(map) {
  renderHeyriList();
  renderHeyriMarkers(map);
  map.on('click', e => {
    if (!pinMode) return;
    togglePinMode(false);
    openPropModal('heyri', e.latlng.lat, e.latlng.lng);
  });
}

function togglePinMode(force) {
  pinMode = force !== undefined ? force : !pinMode;
  const btn = document.getElementById('btn-pin-mode');
  btn.classList.toggle('active', pinMode);
  btn.textContent = pinMode ? '📍 클릭하여 배치' : '📍 핀 추가';
  const el = document.getElementById('map-heyri');
  el.style.cursor = pinMode ? 'crosshair' : '';
}

function renderHeyriMarkers(map) {
  if (!map) return;
  Object.values(heyriMks).forEach(m => map.removeLayer(m));
  heyriMks = {};
  DB.get('heyri').forEach(p => {
    if (p.lat && p.lng) heyriMks[p.id] = addPropMarker(map, p, 'heyri');
  });
}

function addPropMarker(map, p, tab) {
  const mk = L.marker([p.lat, p.lng]).addTo(map);
  mk.bindPopup(buildPopupContent(p, tab));
  return mk;
}

function buildPopupContent(p, tab) {
  const rows = [
    p.area  ? `<div class="lf-popup-row"><span class="lf-popup-label">면적</span><span class="lf-popup-val">${p.area}㎡</span></div>` : '',
    p.sale  ? `<div class="lf-popup-row"><span class="lf-popup-label">매매가</span><span class="lf-popup-val">${p.sale}</span></div>` : '',
    p.rent  ? `<div class="lf-popup-row"><span class="lf-popup-label">임대가</span><span class="lf-popup-val">${p.rent}</span></div>` : '',
    p.use   ? `<div class="lf-popup-row"><span class="lf-popup-label">용도</span><span class="lf-popup-val">${p.use}</span></div>` : '',
    p.memo  ? `<div class="lf-popup-row"><span class="lf-popup-label">메모</span><span class="lf-popup-val">${escHtml(p.memo)}</span></div>` : '',
    p.naver ? `<div class="lf-popup-row"><a class="lf-popup-link" href="${p.naver}" target="_blank">📎 네이버 매물 보기 →</a></div>` : '',
  ].join('');
  return `<div class="lf-popup">
    <div class="lf-popup-title">📍 ${escHtml(p.jibun || '매물')}</div>
    ${rows}
    <div class="lf-popup-actions">
      <button class="btn-e" onclick="editProp('${p.id}','${tab}')">수정</button>
      <button class="btn-d" onclick="delProp('${p.id}','${tab}')">삭제</button>
    </div>
  </div>`;
}

function renderHeyriList() {
  const data = DB.get('heyri');
  document.getElementById('cnt-heyri').textContent = data.length;
  const el = document.getElementById('list-heyri');
  if (!data.length) {
    el.innerHTML = '<div class="empty"><span class="ei">🏠</span>매물이 없습니다.<br>지도를 클릭해 핀을 추가하세요.</div>';
    return;
  }
  el.innerHTML = data.map(p => `
    <div class="prop-card" onclick="focusProp('${p.id}','heyri')">
      <div class="c-addr">📍 ${escHtml(p.jibun || '(지번 없음)')}</div>
      ${p.sale ? `<div class="c-price">매매 ${escHtml(p.sale)}</div>` : ''}
      ${p.rent ? `<div class="c-price">임대 ${escHtml(p.rent)}</div>` : ''}
      <div class="c-use">${p.use || ''}${p.area ? (p.use ? ' · ' : '') + p.area + '㎡' : ''}</div>
      <div class="card-actions">
        <button class="btn-e" onclick="event.stopPropagation();editProp('${p.id}','heyri')">수정</button>
        <button class="btn-d" onclick="event.stopPropagation();delProp('${p.id}','heyri')">삭제</button>
      </div>
    </div>`).join('');
}

function focusProp(id, tab) {
  const p = DB.get(tab).find(x => x.id === id);
  if (!p || !p.lat) return;
  const mi = tab === 'heyri' ? 0 : 1;
  const map = mapObjects[mi];
  if (!map) return;
  map.setView([p.lat, p.lng], 17);
  const mk = tab === 'heyri' ? heyriMks[id] : null;
  if (mk) mk.openPopup();
}

function setupIndustrial(map) {
  renderComplexChips();

      className: '',

    mk.on('click', () => {
      selectComplex(c.id);

function renderComplexChips() {
  document.getElementById('complex-chips').innerHTML =

let ungMks = {};

function setupUngjeong(map) {
  renderUngjeongList();
  renderUngjeongMarkers(map);
}

function searchAddr() {
  const raw = document.getElementById('addr-input').value.trim();
  if (!raw) return;
  // Nominatim (OpenStreetMap) 지오코딩
  const q = encodeURIComponent('경기도 파주시 ' + raw);
  fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&accept-language=ko`)
    .then(r => r.json())
    .then(res => {
      if (!res.length) { alert('주소를 찾을 수 없습니다. 다시 확인해주세요.'); return; }
      const lat = parseFloat(res[0].lat), lng = parseFloat(res[0].lon);
      const map = mapObjects[2];
      map.setView([lat, lng], 17);
      const existing = DB.get('ungjeong').find(p => p.jibun === raw);
      if (existing) {
        if (ungMks[existing.id]) ungMks[existing.id].openPopup();
        alert(`[${raw}] 이미 등록된 필지입니다.`);
      } else {
        openPlotModal(lat, lng, raw);
      }
    })
    .catch(() => alert('검색 중 오류가 발생했습니다.'));
}

function renderUngjeongMarkers(map) {
  if (!map) return;
  Object.values(ungMks).forEach(m => map.removeLayer(m));
  ungMks = {};
  DB.get('ungjeong').forEach(p => {
    if (!p.lat || !p.lng) return;
    const mk = L.marker([p.lat, p.lng]).addTo(map);
    mk.bindPopup(buildPlotPopup(p));
    ungMks[p.id] = mk;
  });
}

function buildPlotPopup(p) {
  return `<div class="lf-popup">
    <div class="lf-popup-title">🏘 ${escHtml(p.jibun || '필지')}</div>
    ${p.area       ? `<div class="lf-popup-row"><span class="lf-popup-label">면적</span><span class="lf-popup-val">${p.area}㎡</span></div>` : ''}
    ${p.unitPrice  ? `<div class="lf-popup-row"><span class="lf-popup-label">공급단가</span><span class="lf-popup-val">${p.unitPrice}원/㎡</span></div>` : ''}
    ${p.totalPrice ? `<div class="lf-popup-row"><span class="lf-popup-label">공급금액</span><span class="lf-popup-val">${p.totalPrice}</span></div>` : ''}
    ${p.bcr        ? `<div class="lf-popup-row"><span class="lf-popup-label">건폐율</span><span class="lf-popup-val">${p.bcr}</span></div>` : ''}
    ${p.far        ? `<div class="lf-popup-row"><span class="lf-popup-label">용적률</span><span class="lf-popup-val">${p.far}</span></div>` : ''}
    ${p.memo       ? `<div class="lf-popup-row"><span class="lf-popup-label">메모</span><span class="lf-popup-val">${escHtml(p.memo)}</span></div>` : ''}
    <div class="lf-popup-actions">
      <button class="btn-e" onclick="editPlot('${p.id}')">수정</button>
      <button class="btn-d" onclick="delPlot('${p.id}')">삭제</button>
    </div>
  </div>`;
}

function focusPlot(id) {
  const p = DB.get('ungjeong').find(x => x.id === id);
  if (!p || !p.lat) return;
  mapObjects[2].setView([p.lat, p.lng], 17);
  if (ungMks[id]) ungMks[id].openPopup();
}

function handleCSV(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split(/\r?\n/);
    const plots = DB.get('ungjeong');
    let added = 0;
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(s => s.trim().replace(/^"|"$/g, ''));
      if (!cols[0]) continue;
      plots.push({ id:'pl_'+Date.now()+'_'+i, jibun:cols[0]||'', area:cols[1]||'', unitPrice:cols[2]||'', totalPrice:cols[3]||'', bcr:cols[4]||'', far:cols[5]||'', memo:cols[6]||'', lat:null, lng:null });
      added++;
    }
    DB.set('ungjeong', plots);
    renderUngjeongList();
    alert(`✅ ${added}개 필지가 업로드되었습니다.`);
  };
  reader.readAsText(file, 'UTF-8');
  input.value = '';
}

function calcTotal() {
  const area = parseFloat(document.getElementById('pl-area').value.replace(/,/g,''));
  const unit = parseFloat(document.getElementById('pl-unit').value.replace(/,/g,''));
  if (!isNaN(area) && !isNaN(unit))
    document.getElementById('pl-total').value = Math.round(area*unit).toLocaleString()+'원';
}

// ■ MODAL — 매물
// ════════════════════════════════════════════
function openPropModal(tab, lat, lng) {
  setVal('p-id',''); setVal('p-tab',tab); setVal('p-lat',lat||''); setVal('p-lng',lng||'');
  setVal('p-jibun',''); setVal('p-area',''); setVal('p-sale','');
  setVal('p-rent',''); setVal('p-use',''); setVal('p-memo',''); setVal('p-naver','');
  document.getElementById('modal-prop-title').textContent = tab==='heyri' ? '헤이리 매물 추가' : '산업단지 매물 추가';
  const fg = document.getElementById('fg-complex');
  if (tab === 'industrial') {
    fg.style.display = '';
    const sel = document.getElementById('p-complex');
    sel.innerHTML = '<option value="">선택하세요</option>' + COMPLEXES.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    if (selComplex) sel.value = selComplex;
  } else fg.style.display = 'none';
  openModal('modal-prop');
}

function editProp(id, tab) {
  const p = DB.get(tab).find(x=>x.id===id); if (!p) return;
  setVal('p-id',p.id); setVal('p-tab',tab); setVal('p-lat',p.lat||''); setVal('p-lng',p.lng||'');
  setVal('p-jibun',p.jibun||''); setVal('p-area',p.area||''); setVal('p-sale',p.sale||'');
  setVal('p-rent',p.rent||''); setVal('p-use',p.use||''); setVal('p-memo',p.memo||''); setVal('p-naver',p.naver||'');
  document.getElementById('modal-prop-title').textContent = '매물 수정';
  const fg = document.getElementById('fg-complex');
  if (tab==='industrial') {
    fg.style.display='';
    const sel=document.getElementById('p-complex');
    sel.innerHTML='<option value="">선택하세요</option>'+COMPLEXES.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    sel.value=p.complex||'';
  } else fg.style.display='none';
  openModal('modal-prop');
}

function saveProp() {
  const jibun = gv('p-jibun'); if (!jibun) { alert('지번을 입력해주세요.'); return; }
  const tab = gv('p-tab'), id = gv('p-id');
  const prop = { id:id||'prop_'+Date.now(), complex:gv('p-complex'), jibun, area:gv('p-area'), sale:gv('p-sale'), rent:gv('p-rent'), use:gv('p-use'), memo:gv('p-memo'), naver:gv('p-naver'), lat:parseFloat(gv('p-lat'))||null, lng:parseFloat(gv('p-lng'))||null };
  const data = DB.get(tab);
  if (id) { const i=data.findIndex(x=>x.id===id); if(i>=0) data[i]=prop; } else data.push(prop);
  DB.set(tab, data);
  closeModal('modal-prop');
  if (tab==='heyri') { renderHeyriList(); if(mapInited[0]) renderHeyriMarkers(mapObjects[0]); }
  else renderIndustrialList();
}

function delProp(id, tab) {
  if (!confirm('매물을 삭제하시겠습니까?')) return;
  DB.set(tab, DB.get(tab).filter(x=>x.id!==id));
  if (tab==='heyri') { if(heyriMks[id]){mapObjects[0].removeLayer(heyriMks[id]);delete heyriMks[id];} renderHeyriList(); }
  else renderIndustrialList();
}

// ════════════════════════════════════════════
// ■ MODAL — 필지
// ════════════════════════════════════════════
function openPlotModal(lat, lng, jibun) {
  setVal('pl-id',''); setVal('pl-lat',lat||''); setVal('pl-lng',lng||'');
  setVal('pl-jibun',jibun||''); setVal('pl-area',''); setVal('pl-unit','');
  setVal('pl-total',''); setVal('pl-bcr',''); setVal('pl-far',''); setVal('pl-memo','');
  document.getElementById('modal-plot-title').textContent = '필지 추가';
  openModal('modal-plot');
}

function editPlot(id) {
  const p = DB.get('ungjeong').find(x=>x.id===id); if (!p) return;
  setVal('pl-id',p.id); setVal('pl-lat',p.lat||''); setVal('pl-lng',p.lng||'');
  setVal('pl-jibun',p.jibun||''); setVal('pl-area',p.area||''); setVal('pl-unit',p.unitPrice||'');
  setVal('pl-total',p.totalPrice||''); setVal('pl-bcr',p.bcr||''); setVal('pl-far',p.far||''); setVal('pl-memo',p.memo||'');
  document.getElementById('modal-plot-title').textContent = '필지 수정';
  openModal('modal-plot');
}

function savePlot() {
  const jibun = gv('pl-jibun'); if (!jibun) { alert('지번을 입력해주세요.'); return; }
  const id = gv('pl-id');
  const plot = { id:id||'pl_'+Date.now(), jibun, area:gv('pl-area'), unitPrice:gv('pl-unit'), totalPrice:gv('pl-total'), bcr:gv('pl-bcr'), far:gv('pl-far'), memo:gv('pl-memo'), lat:parseFloat(gv('pl-lat'))||null, lng:parseFloat(gv('pl-lng'))||null };
  const data = DB.get('ungjeong');
  if (id) { const i=data.findIndex(x=>x.id===id); if(i>=0) data[i]=plot; } else data.push(plot);
  DB.set('ungjeong', data);
  closeModal('modal-plot');
  renderUngjeongList();
  if (mapInited[2]) renderUngjeongMarkers(mapObjects[2]);
}

function delPlot(id) {
  if (!confirm('필지를 삭제하시겠습니까?')) return;
  DB.set('ungjeong', DB.get('ungjeong').filter(x=>x.id!==id));
  if (ungMks[id]) { mapObjects[2].removeLayer(ungMks[id]); delete ungMks[id]; }
  renderUngjeongList();
}

// ════════════════════════════════════════════
// ■ HELPERS
// ════════════════════════════════════════════
const gv = id => document.getElementById(id).value.trim();
const setVal = (id, v) => { document.getElementById(id).value = v; };
const openModal = id => document.getElementById(id).classList.add('open');
const closeModal = id => document.getElementById(id).classList.remove('open');
const closeOnBg = (e, id) => { if (e.target===e.currentTarget) closeModal(id); };
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════
// ■ INIT
// ════════════════════════════════════════════
window.addEventListener('load', () => {
  initMap(0);
  mapInited[0] = true;
});
</script>
